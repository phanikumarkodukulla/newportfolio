<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>PHANI KUMAR SHARMA</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which will cause the browser to load the correct route without a page reload.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1).join('/') + '/?p=/' +
        l.pathname.slice(1).replace(/&/g, '~and~').replace(/\//g, '~slash~') +
        l.search.replace(/&/g, '~and~') + l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
